project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "Andrew S. Rosenberg"
  description: "Associate Professor of Political Science, University of Florida"
  site-url: "https://www.andrew-rosenberg.com"
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    background: light
    left:
      - text: "About"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Working Papers"
        href: working-papers.qmd
      - text: "Books"
        href: books.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "CV"
        href: assets/asr-cv.pdf
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: envelope
        href: mailto:andrew.rosenberg@ufl.edu
        aria-label: Email
      - icon: github
        href: https://github.com/asrosenberg
        aria-label: GitHub
  page-footer:
    left: "© 2026 Andrew S. Rosenberg"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 2
    fontsize: 1.05em
    linkcolor: "#0a58ca"
    grid:
      body-width: 800px
